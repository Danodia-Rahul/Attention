services:
  app:
    build: .
    container_name: app
    ports:
      - "8000:8000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
      - ./prometheus/rules.yaml:/etc/prometheus/rules/rules.yaml
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  configer:
    image: alpine:latest
    container_name: alertmanager-helper
    volumes:
      - ./alertmanager/alertmanager.yaml:/etc/alertmanager.template.yaml
      - alertmanager_data:/etc/alertmanager
    env_file:
      - .env
    command: >
      sh -c "apk add --no-cache gettext &&
             envsubst < /etc/alertmanager.template.yaml > /etc/alertmanager/alertmanager.yaml"

  alert-manager:
    image: prom/alertmanager:latest
    container_name: alert-manager
    ports:
      - "9093:9093"
    depends_on:
      configer:
        condition: service_completed_successfully
      prometheus:
        condition: service_started
    volumes:
      - alertmanager_data:/etc/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yaml"
      - "--cluster.listen-address="
    restart: unless-stopped

volumes:
  prometheus_data:
  alertmanager_data:
